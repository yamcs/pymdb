name: CI

on: [push, pull_request]

jobs:
  examples:
    name: Examples
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Set up pymdb
        run: |
          pip install --upgrade pip
          pip install -e .
      - name: Run examples
        run: |
          cd examples
          python ccsds.py
          python csp.py
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: 3.9
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8
      - name: Lint with flake8
        run: flake8 src --count --show-source --statistics
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install build tool
        run: |
          pip install --upgrade pip
          pip install build
      - name: Build sdist and wheel
        run: python -m build
      - name: Verify py.typed is packaged
        run: |
          unzip -l dist/*.whl | grep -q py.typed
          tar tzf dist/*.tar.gz | grep -q py.typed
